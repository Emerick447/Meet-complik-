<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Appel vidéo WebRTC</title>
</head>
<body>
<h1>Appel vidéo 2 personnes (sans serveur)</h1>

<video id="local" autoplay muted playsinline width="320"></video>
<video id="remote" autoplay playsinline width="320"></video>

<br><br>

<button id="create">Créer une offre</button>
<button id="answer">Créer une réponse</button>

<br><br>

<textarea id="in" rows="8" cols="80" placeholder="Coller l'offre ou la réponse ici"></textarea>
<br>
<textarea id="out" rows="8" cols="80" placeholder="Code à envoyer à l'autre personne"></textarea>

<script>
let pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

pc.onicecandidate = () => {
  if(pc.localDescription){
    document.getElementById('out').value =
      JSON.stringify(pc.localDescription);
  }
};

pc.ontrack = e => {
  document.getElementById('remote').srcObject = e.streams[0];
};

navigator.mediaDevices.getUserMedia({video:true,audio:true})
.then(stream=>{
  document.getElementById('local').srcObject = stream;
  stream.getTracks().forEach(t=>pc.addTrack(t,stream));
});

create.onclick = async ()=>{
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
};

answer.onclick = async ()=>{
  const data = JSON.parse(document.getElementById('in').value);

  if(data.type === "offer"){
    await pc.setRemoteDescription(data);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
  } else if(data.type === "answer"){
    await pc.setRemoteDescription(data);
  }
};
</script>
</body>
</html>
